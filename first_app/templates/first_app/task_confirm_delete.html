{% extends "base.html" %} {% block content %}

<h2>Usuń zadanie '{{ task.title }}'</h2>

<p>Czy na pewno usunąć "{{ object }}"?</p>

<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger btn-sm" style="width: 20ch" type="submit">
    Tak, usuń
  </button>
  <a
    href="{% url 'task_list' %}"
    class="btn btn-outline-secondary btn-sm"
    style="width: 20ch"
    >Anuluj</a
  >
</form>

{% endblock %}
